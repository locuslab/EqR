# @package _global_

defaults:
  - /arch: trm
  - /dataset: maze_unique
  - _self_

hydra:
  output_subdir: null

global_batch_size: 768
epochs: 100000
train_epochs_per_iter: 5000
eval_interval_steps: 5000
checkpoint_interval_steps: 5000
heavy_metrics_log_interval: 2500
steps_hist_log_interval_steps: 1000

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000
target_q_update_every: 4
beta1: 0.9
beta2: 0.95
weight_decay: 1.0
arch:
  L_layers: 1
  L_cycles: 4
  hidden_size: 128
  pos_encodings: rope
  board_height: null
  board_width: null
  mlp_t: false

load_weights_only: false

ema: true
ema_rate: 0.999
gradient_checkpoint: false
grad_norm_log_interval_steps: null
